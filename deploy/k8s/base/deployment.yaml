# deploy/k8s/base/deployment.yaml
# BLUEPRINT: Composer 2 implements from this structure
# PURPOSE: Base Kubernetes Deployment manifest for the API. Includes liveness/readiness/startup probes,
#          resource requests/limits, env from ConfigMap/Secret. Per spec §26.10 item 248.
# SECTIONS:
#   - apiVersion: apps/v1, kind: Deployment
#   - metadata: name, namespace, labels
#   - spec: replicas (patched per overlay), selector, template
#   - containers: image (patched per overlay), ports, envFrom, resources, probes
# DESIGN DECISIONS:
#   - Non-root user in container (runAsNonRoot: true, runAsUser: 1000)
#   - readOnlyRootFilesystem: true (security hardening)
#   - Probes use /health, /ready, /live endpoints (must align with health/router.py)
#   - Resource requests != limits: allow burst; limits prevent runaway processes
#   - env from ConfigMap (non-secrets) and Secret (DATABASE_URL, JWT_SECRET_KEY)

