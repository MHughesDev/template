# pyproject.toml
# BLUEPRINT: Composer 2 implements from this structure
# PURPOSE: Python project configuration. Defines dependencies, dev dependencies, and tool
#          configs (ruff, mypy, pytest, coverage). Per spec §26.1 item 7.
# SECTIONS:
#   - [project]: name, version, python-requires, dependencies, description
#   - [project.optional-dependencies]: dev, test, lint groups
#   - [build-system]: hatchling or setuptools
#   - [tool.ruff]: lint rules, format settings, per-file ignores
#   - [tool.mypy]: strict type checking settings
#   - [tool.pytest.ini_options]: test paths, markers, asyncio mode, coverage
#   - [tool.coverage.run]: source, omit patterns
#   - [tool.coverage.report]: fail_under (coverage floor)
# DESIGN DECISIONS:
#   - python-requires = ">=3.12" — minimum version enforced
#   - Dependencies use minimum version pins (~= or >=) not exact (== allows patch updates)
#   - Dev, test, lint split into optional groups for lean CI environments
#   - ruff replaces flake8, isort, pydocstyle, pyupgrade — single tool
#   - mypy strict mode: all checks enabled; no unexplained Any
#   - asyncio_mode = "auto": pytest-asyncio auto mode (no @pytest.mark.asyncio needed)

[project]
# name = "{{project-slug}}"  # filled during initialization
# version = "0.1.0"
# description = "{{one-line-pitch}}"  # from idea.md §1
# requires-python = ">=3.12"
#
# dependencies = [
#   "fastapi>=0.111.0",
#   "uvicorn[standard]>=0.30.0",
