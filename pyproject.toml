# [tool.ruff]
# CONTENT: ruff linting and formatting configuration
# target-version = "py312"
# line-length = 88
# [tool.ruff.lint]
# select = ["E", "F", "W", "I", "N", "UP", "S", "B", "A", "C4", "T20", "SIM", "RET", "ERA"]
# ignore = ["S101"]  # allow assert in tests
# per-file-ignores = {"*/tests/*" = ["S101", "S105"], "*/alembic/*" = ["INP001"]}
# [tool.ruff.format]
# quote-style = "double", indent-style = "space", skip-magic-trailing-comma = false

# [tool.mypy]
# CONTENT: mypy type checking configuration (strict mode)
# python_version = "3.12"
# strict = true
# ignore_missing_imports = false
# plugins = ["pydantic.mypy"]
# [mypy.pydantic.mypy]
# init_forbid_extra = true, init_typed = true

# [tool.pytest.ini_options]
# CONTENT: pytest configuration
# testpaths = ["apps/api/tests"]
# asyncio_mode = "auto"
# python_files = ["test_*.py"]
# python_classes = ["Test*"]
# python_functions = ["test_*"]
# markers = [
#   "unit: Tests with no external dependencies",
#   "integration: Tests requiring real database or services",
#   "smoke: Critical path tests run post-deploy",
#   "slow: Tests taking >5 seconds",
# ]
# addopts = "--cov=apps/api/src --cov-report=xml --cov-report=term-missing -v"

# [tool.coverage.run]
# source = ["apps/api/src", "packages"]
# omit = ["*/alembic/*", "*/__init__.py", "*/test_*.py"]

# [tool.coverage.report]
# fail_under = 80  # floor; increased by coverage-ratchet.py as coverage improves
# exclude_lines = ["if TYPE_CHECKING:", "raise NotImplementedError", "pass"]

