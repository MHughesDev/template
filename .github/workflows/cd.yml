# .github/workflows/cd.yml
# BLUEPRINT: Composer 2 implements from this structure
# PURPOSE: Continuous deployment workflow. Triggers: main push, semver tags, manual dispatch.
#          Promotion: dev → staging → prod with environment protection. Per spec §26.7 item 197.
# SECTIONS:
#   - on: push (branches: [main]), release (types: [published]), workflow_dispatch
#   - jobs:
#     - deploy-dev: auto on main push; build + push image; apply to dev overlay
#     - deploy-staging: manual approval; apply to staging overlay
#     - deploy-prod: manual approval + release:verify; apply to prod overlay
# DESIGN DECISIONS:
#   - Environment protection: staging and prod require human approval
#   - Container registry: GHCR (github.com/owner/repo) — configurable
#   - Kubernetes deploy via: kubectl apply -k deploy/k8s/overlays/<env>
#   - DB migrations: approval gate for prod; run after image deploy but before health check
#   - Rollback: documented in docs/operations/rollback.md; manual trigger available

