# .github/workflows/ci.yml
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python
      - name: Lint
        run: make lint
      - name: Format check
        run: make fmt
      - name: Typecheck
        run: make typecheck
      - name: Tests
        run: make test
      - name: Queue validate
        run: make queue-validate
      - name: Self audit
        run: make audit-self
