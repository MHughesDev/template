# .github/workflows/ci.yml
# BLUEPRINT: Composer 2 implements from this structure
# PURPOSE: Continuous integration workflow. Runs on PR. Stages: checkout, deps, lint,
#          typecheck, test (unit+integration), image build, image scan, docs check,
#          migration dry-run, k8s validate. Per spec §26.7 item 196 and §11.2.
# SECTIONS:
#   - name: CI
#   - on: pull_request (branches: [main])
#   - jobs:
#     - lint: ruff check + format check
#     - typecheck: mypy --strict
#     - test: pytest with coverage (matrix: SQLite + Postgres)
#     - build: Docker image build + Trivy scan
#     - docs: make docs:check
#     - migrations: alembic upgrade head --sql dry-run
#     - k8s: make k8s:render + make k8s:validate
# DESIGN DECISIONS:
#   - Test matrix: unit tests run fast (no DB), integration tests require Postgres service
#   - Coverage artifact uploaded for trend tracking
#   - Image scan uses Trivy with SARIF output → GitHub Security tab
#   - All jobs must pass before merge (enforced by branch protection)

