# .github/workflows/security.yml
# BLUEPRINT: Composer 2 implements from this structure
# PURPOSE: Security scanning workflow. Runs on PR and scheduled weekly.
#          Dependency review, code scanning (bandit/semgrep), image scanning (Trivy).
#          Per spec §26.7 item 198.
# SECTIONS:
#   - on: pull_request, schedule (weekly Monday 0:00 UTC)
#   - jobs:
#     - dependency-review: GitHub dependency review action (on PR only)
#     - code-scan: bandit SAST + semgrep (optional)
#     - image-scan: Trivy on built image

