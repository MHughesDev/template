# .github/workflows/security.yml
name: Security

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]" bandit
      - run: bandit -c .bandit.yml -r apps/api/src packages/contracts packages/tasks
