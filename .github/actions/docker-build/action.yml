# .github/actions/docker-build/action.yml
name: Docker Build with Cache
description: Build and optionally load a Docker image using Buildx and GHA cache.

inputs:
  image-name:
    description: Image name (without tag), e.g. ghcr.io/org/repo
    required: true
  tag:
    description: Image tag
    default: latest
    required: false
  dockerfile:
    description: Path to Dockerfile
    default: apps/api/Dockerfile
    required: false
  context:
    description: Docker build context directory
    default: .
    required: false
  push:
    description: Push to registry (requires login step before this action)
    default: "false"
    required: false

runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Build (and optionally push)
      uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        push: ${{ inputs.push == 'true' }}
        load: ${{ inputs.push != 'true' }}
        tags: ${{ inputs.image-name }}:${{ inputs.tag }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
