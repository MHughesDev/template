# monitoring/docker-compose.monitoring.yml
# PURPOSE: Local Prometheus + Grafana observability overlay for development.
#          Use with: docker compose -f docker-compose.yml -f monitoring/docker-compose.monitoring.yml up
#          Per spec §26.12 item 385.
# SECTIONS:
#   - prometheus: scrapes /metrics from the api service; loads alerts.yml
#   - grafana: dashboards provisioned from dashboards/api-overview.json
# DESIGN DECISIONS:
#   - Separate compose file: observability is optional for local dev
#   - Grafana default admin/admin: intentional for local dev (never production)
#   - Prometheus scrapes api:8000/metrics at 15s interval
#   - Grafana provisioned from dashboards directory (hot-reload on change)

