# docker-compose.yml
# Local development stack with optional profiles: db, ai, worker.

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - .:/app
    working_dir: /app
    command: >
      uvicorn apps.api.src.main:app
      --host 0.0.0.0
      --port 8000
      --reload
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app_net

  db:
    image: postgres:16-alpine
    profiles:
      - db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app_net

  chroma:
    image: chromadb/chroma:latest
    profiles:
      - ai
    ports:
      - "${CHROMA_PORT:-8001}:8000"
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/api/v1/heartbeat || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - app_net

  redis:
    image: redis:7-alpine
    profiles:
      - worker
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app_net

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    profiles:
      - worker
    env_file:
      - .env
    command: ["python", "-c", "print('worker profile placeholder — wire Celery/ARQ')"]
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app_net

volumes:
  postgres_data:
  chroma_data:

networks:
  app_net:
    driver: bridge
