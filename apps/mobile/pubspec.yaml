name: mobile_app
description: Flutter mobile client for the FastAPI backend

publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Navigation
  go_router: ^14.0.0
  go_router_builder: ^2.7.0

  # State Management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.5

  # HTTP & API
  dio: ^5.4.0
  retrofit: ^4.1.0

  # Local Storage
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.0
  flutter_secure_storage: ^9.2.0

  # Security & Auth
  local_auth: ^2.2.0
  crypto: ^3.0.3

  # UI & Design
  dynamic_color: ^1.7.0
  flutter_svg: ^2.0.10
  cached_network_image: ^3.3.1

  # Utilities
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  intl: ^0.19.0
  logger: ^2.3.0
  package_info_plus: ^8.0.0
  path_provider: ^2.1.0
  path: ^1.9.0

  # Functional programming
  fpdart: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Build & Codegen
  build_runner: ^2.4.0
  custom_lint: ^0.6.0
  riverpod_generator: ^2.4.0
  riverpod_lint: ^2.3.10
  retrofit_generator: ^8.1.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0
  go_router_builder: ^2.7.0
  drift_dev: ^2.18.0

  # Testing
  mocktail: ^1.0.0
  alchemist: ^0.10.0
  network_image_mock: ^2.0.0

  # Linting
  very_good_analysis: ^5.1.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/

flutter_gen:
  output: lib/generated/
  line_length: 100

  integrations:
    flutter_svg: true
    cached_network_image: true

analyzer:
  plugins:
    - custom_lint
  exclude:
    - lib/generated/**
    - "**/*.g.dart"
    - "**/*.freezed.dart"
