# apps/api/alembic.ini
# BLUEPRINT: Composer 2 implements from this structure
# PURPOSE: Alembic configuration for database migrations. Per spec §26.8 item 208.
# SECTIONS:
#   - [alembic]: main configuration
#   - script_location: points to alembic/ directory
#   - sqlalchemy.url: read from DATABASE_URL env var (never hardcoded)
#   - file_template: migration filename format with timestamp
#   - timezone: UTC for consistent timestamps
# DESIGN DECISIONS:
#   - sqlalchemy.url reads from environment to support SQLite (dev) and PostgreSQL (prod)
#   - file_template includes both timestamp and slug for human-readable filenames
#   - output_encoding: utf-8 for cross-platform consistency

[alembic]
# CONTENT: Standard alembic.ini with all configuration for this project
# script_location = apps/api/alembic
# prepend_sys_path = .
# sqlalchemy.url = env:DATABASE_URL
# file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s
# timezone = UTC
# output_encoding = utf-8

# Logging configuration
[loggers]
# CONTENT: keys = root,sqlalchemy,alembic logging configuration

[handlers]
# CONTENT: keys = console handler configuration

[formatters]
# CONTENT: keys = generic formatter with timestamp and level
